# App name
spring.application.name=MzansiBuilds

# H2 file-based database
# ./data/ folder is created automatically next to your project
# Without "file:", H2 runs in memory and ALL data is lost on restart
spring.datasource.url=jdbc:h2:file:./data/mzansibuilds
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# "update" = create tables if missing, update structure if changed
# Never use "create" long-term - it wipes your data on every restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 browser console - lets you inspect DB at localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Vaadin
vaadin.launch-browser=true
